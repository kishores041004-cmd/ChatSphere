<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="bubbleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0ECFF"/>
    </linearGradient>
  </defs>

  <!-- Outer sphere -->
  <circle cx="200" cy="200" r="170" fill="url(#sphereGradient)"/>

  <!-- Latitude lines to suggest "sphere" -->
  <ellipse cx="200" cy="200" rx="170" ry="60" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="3"/>
  <ellipse cx="200" cy="200" rx="170" ry="120" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="3"/>
  <line x1="200" y1="30" x2="200" y2="370" stroke="#ffffff" stroke-opacity="0.2" stroke-width="3"/>

  <!-- Chat bubble -->
  <path d="M120 150 
           Q120 110 165 110 
           L255 110 
           Q300 110 300 150 
           L300 210 
           Q300 250 255 250 
           L190 250 
           L150 290 
           L155 250 
           L165 250 
           Q120 250 120 210 
           Z" 
        fill="url(#bubbleGradient)"/>

  <!-- Dots inside bubble (representing live chat) -->
  <circle cx="165" cy="180" r="10" fill="#1E3A8A"/>
  <circle cx="210" cy="180" r="10" fill="#1E3A8A"/>
  <circle cx="255" cy="180" r="10" fill="#1E3A8A"/>

  <!-- Text -->
  <text x="200" y="345" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" text-anchor="middle">ChatSphere</text>
</svg>
