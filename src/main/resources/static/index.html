<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>ChatSphere | Real-Time Chat</title>
    <link rel="stylesheet" href="/css/main.css?v=3" />
</head>
<body>
<noscript>
    <h2>Sorry! Your browser doesn't support Javascript</h2>
</noscript>

<div id="username-page">
    <div class="username-page-container">
        <button type="button" id="theme-toggle-auth" class="theme-toggle-btn" title="Toggle Theme">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <h1 class="title" id="auth-title">Login to ChatSphere</h1>
        <form id="usernameForm" name="usernameForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Username" autocomplete="off" class="form-control" required />
            </div>
            <div class="form-group password-wrapper">
                <input type="password" id="password" placeholder="Password" autocomplete="off" class="form-control" required />
                <button type="button" id="password-toggle-btn" class="password-toggle" title="Show/Hide Password">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
            <div class="form-group">
                <button type="submit" id="auth-submit" class="accent username-submit">Login</button>
            </div>
            <div class="form-group" style="margin-top: 15px; font-size: 14px; text-align: center;">
                <span id="toggle-message">Don't have an account?</span> 
                <a href="#" id="toggle-auth-mode">Register here</a>
            </div>
            <div id="auth-feedback" class="form-group" style="margin-top: 10px; font-weight: bold; text-align: center; font-size: 14px;"></div>
        </form>
    </div>
</div>

<div id="google-username-page" class="hidden">
    <div class="username-page-container">
        <h1 class="title" style="font-size: 24px; margin-bottom: 5px;">Choose Display Name</h1>
        <p style="color: #666; font-size: 14px; text-align: center; margin-bottom: 20px;">Authenticated via Google. Enter your username to join the chat.</p>
        <form id="googleUsernameForm" name="googleUsernameForm">
            <div class="form-group">
                <input type="text" id="google-name-input" placeholder="Display Name" autocomplete="off" class="form-control" required />
            </div>
            <div class="form-group">
                <button type="submit" class="accent username-submit">Start Chatting</button>
            </div>
        </form>
    </div>
</div>

<div id="chat-page" class="hidden">
    <div class="chat-container">
        <div class="chat-header" style="position: relative;">
            <h2 style="margin: 0;">01. Random Group</h2>
            <button type="button" id="theme-toggle-chat" class="theme-toggle-btn chat-theme-toggle" title="Toggle Theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
            <button type="button" id="room-info-btn" class="theme-toggle-btn chat-theme-toggle hidden" title="Group Info" style="right: 60px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            </button>
            <p style="margin: 5px 0 0 0; font-size: 14px; color: #666;">
                Logged in as: <span id="logged-in-user" style="font-weight: bold; color: #128ff2;">Guest</span> 
                | <a href="#" id="logout-link" style="color: #ff4743; text-decoration: none; font-weight: bold; margin-left: 5px;">Logout</a>
            </p>
        </div>
        <div class="connecting">
            Connecting...
        </div>
        <div class="chat-main">
            <ul id="messageArea">

            </ul>
            <div id="active-users-sidebar" class="sidebar">
                <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
                    <span>Chats</span>
                    <button type="button" id="new-group-btn" class="new-group-btn" title="Create New Group" style="background: var(--primary-color); border: none; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; min-height: auto; width: auto; height: auto; box-shadow: none;">+ New Group</button>
                </div>
                <ul id="rooms-list" style="list-style: none; padding: 0; margin: 0; overflow-y: auto;">
                    <!-- Rooms loaded dynamically -->
                </ul>
            </div>
        </div>
        <div id="typing-indicator" class="typing-indicator hidden-indicator"></div>
        <form id="messageForm" name="messageForm" nameForm="messageForm">
            <div class="form-group">
                <div class="input-group clearfix">
                    <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="form-control"/>
                    <button type="submit" class="primary">Send</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- New Group Modal -->
<div id="new-group-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin: 0; font-size: 1.25rem;">Create New Group</h3>
            <span class="close-modal" id="close-group-modal" style="cursor: pointer; font-size: 1.5rem; font-weight: bold;">&times;</span>
        </div>
        <form id="new-group-form">
            <div class="form-group">
                <label for="group-name" style="display: block; margin-bottom: 5px; font-weight: 500;">Group Name</label>
                <input type="text" id="group-name" placeholder="Enter group name..." class="form-control" required autocomplete="off"/>
            </div>
            <div class="form-group">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Add Members</label>
                <div id="members-checkbox-list" class="checkbox-list">
                    <!-- Dynamically populated -->
                </div>
            </div>
            <div class="form-actions" style="text-align: right; margin-top: 15px;">
                <button type="button" id="cancel-group-btn" class="secondary" style="margin-right: 5px; padding: 8px 15px;">Cancel</button>
                <button type="submit" class="primary" style="padding: 8px 15px;">Create Group</button>
            </div>
        </form>
    </div>
</div>

<!-- Group Info Modal -->
<div id="group-info-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="info-group-title" style="margin: 0; font-size: 1.25rem;">Group Details</h3>
            <span class="close-modal" id="close-info-modal" style="cursor: pointer; font-size: 1.5rem; font-weight: bold;">&times;</span>
        </div>
        <div class="group-info-body">
            <!-- Group Description Section -->
            <div class="form-group">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Group Description</label>
                <div id="group-desc-display-wrapper" style="display: flex; gap: 8px; align-items: start;">
                    <p id="group-desc-text" style="margin: 0; flex: 1; font-style: italic; color: #777; font-size: 14px;">No description provided.</p>
                    <button type="button" id="edit-desc-btn" class="secondary" style="padding: 4px 8px; font-size: 11px; min-height: auto; width: auto; height: auto; box-shadow: none;">Edit</button>
                </div>
                <div id="group-desc-edit-wrapper" class="hidden" style="display: flex; flex-direction: column; gap: 8px;">
                    <textarea id="group-desc-input" placeholder="Add group description..." class="form-control" style="resize: vertical; min-height: 60px; font-family: inherit; font-size: 14px; padding: 5px;"></textarea>
                    <div style="text-align: right;">
                        <button type="button" id="cancel-desc-btn" class="secondary" style="padding: 4px 8px; font-size: 11px; min-height: auto; margin-right: 5px; width: auto; height: auto; box-shadow: none;">Cancel</button>
                        <button type="button" id="save-desc-btn" class="primary" style="padding: 4px 8px; font-size: 11px; min-height: auto; width: auto; height: auto; box-shadow: none;">Save</button>
                    </div>
                </div>
            </div>

            <!-- Members List & Add Members -->
            <div class="form-group">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Group Members</label>
                <ul id="info-members-list" style="max-height: 120px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 4px; padding: 10px; list-style: none; margin: 0; background-color: var(--bg-color); font-size: 14px;">
                    <!-- Dynamically populated -->
                </ul>
            </div>

            <div class="form-group">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">Add Members</label>
                <div id="info-add-members-list" class="checkbox-list">
                    <!-- Dynamically populated checklist of friends not currently in the group -->
                </div>
                <div style="text-align: right; margin-top: 8px;">
                    <button type="button" id="submit-add-members-btn" class="primary" style="padding: 6px 12px; font-size: 12px; min-height: auto; width: auto; height: auto; box-shadow: none;">Add Selected Members</button>
                </div>
            </div>

            <!-- Exit Option -->
            <div class="form-actions" style="margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 15px; text-align: left;">
                <button type="button" id="exit-group-btn" class="accent" style="width: 100%; font-weight: bold; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Exit Group
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/main.js?v=3"></script>
</body>
</html>
