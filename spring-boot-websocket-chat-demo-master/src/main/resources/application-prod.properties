# Production Database Settings: Self-contained in-memory H2 database
spring.datasource.url=jdbc:h2:mem:chatsphere;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Cross-Origin Session Cookie Settings (Required for separate frontend-backend deployments)
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
